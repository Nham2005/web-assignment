<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bài tập sinh viên</title>
</head>

<body>

<h2>Kết quả</h2>
<p id="result"></p>

<script>

let fullName = "trinh thi nham";  
let studentId = "27A4041234";

// Tách tên
let parts = fullName.split(" ");

let firstName = parts[parts.length - 1]; 
let lastName = parts[0]; 
let middleName = parts[1];

// Tạo email
let email = firstName + lastName[0] + middleName[0] + "." + studentId.toLowerCase() + "@hvnh.edu.vn";

// Xử lý mã sinh viên
let coursePeriod = studentId.substring(0,2); 
let faculty = studentId.charAt(2);

// Tính tổng 4 số cuối
let last4 = studentId.slice(-4); 

let sum = 0;
for(let i = 0; i < last4.length; i++){
  sum += parseInt(last4[i]);
}

// In kết quả
document.getElementById("result").innerHTML =
  "Xin chào " + fullName +
  ", bạn là sinh viên khóa " + coursePeriod +
  ", khoa " + faculty +
  ", tổng 4 số cuối trong mã sinh viên là " + sum +
  "<br>Email: " + email;

</script>

</body>
</html>
