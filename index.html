<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bài tập sinh viên</title>
</head>

<body>

<h2>Kết quả</h2>
<p id="result"></p>

<script>

// 1. Khai báo biến
let fullName = "nguyen van binh";   // không dấu
let studentId = "27A4041234";

// 2. Tách tên
let parts = fullName.split(" ");

let firstName = parts[parts.length - 1]; // binh
let lastName = parts[0]; // nguyen
let middleName = parts[1]; // van

// 3. Tạo email
let email = firstName + lastName[0] + middleName[0] + "." + studentId.toLowerCase() + "@hvnh.edu.vn";

// → binhnv.27a4041234@hvnh.edu.vn

// 4. Xử lý mã sinh viên
let coursePeriod = studentId.substring(0,2); // 27
let faculty = studentId.charAt(2); // A

// 5. Tính tổng 4 số cuối
let last4 = studentId.slice(-4); // 1234

let sum = 0;
for(let i = 0; i < last4.length; i++){
  sum += parseInt(last4[i]);
}

// 6. In kết quả
document.getElementById("result").innerHTML =
  "Xin chào " + fullName +
  ", bạn là sinh viên khóa " + coursePeriod +
  ", khoa " + faculty +
  ", tổng 4 số cuối trong mã sinh viên là " + sum +
  "<br>Email: " + email;

</script>

</body>
</html>
